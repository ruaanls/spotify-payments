spring:
  config:
    import: "optional:aws-parameterstore:/config/myapp/"

  application:
    name: ms-pagamentos

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect  # ← sem o "8", esse é o correto no Hibernate 6
        format_sql: true

cloud:
  aws:
    region:
      static: sa-east-1